[metadata]
name = "rhi"

[logging]
filter = "info"
stdout = true

[relays]
urls = [
  "ws://127.0.0.1:8080"
]

[nostr.nip89]
identifier = "rhi"
extra_tags = []

[subscriber.backoff]
base_ms = 500
max_ms = 30000
factor = 2
jitter_ms = 0

[subscriber.state]
replay_window_secs = 86400
replay_overlap_secs = 300

[trade_validation_receipt]
backend = "disabled"
proof_mode = "none"
