[package]
name = "rhi"
version = "0.1.0"
authors = ["Radroots Authors"]
license = "AGPL-3.0-or-later"
edition = "2024"
description = "Radroots trade validation and receipt worker"

[dependencies]
anyhow = "1.0"
clap = { version = "4", features = ["derive"] }
config = "0.15"
nostr = { version = "0.40.0", features = ["nip04"] }
nostr-sdk = "0.40.0"
serde = "1.0"
serde_json = "1.0"
tempfile = "3.19.1"
thiserror = "1.0"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"
uuid = { version = "1.16.0", features = ["v4"] }
